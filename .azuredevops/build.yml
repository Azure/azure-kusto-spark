# Azure DevOps CI Build Pipeline for azure-kusto-spark
# Triggers on push to any branch and PRs
# Equivalent of .github/workflows/build.yml
# Azure DevOps CI Build Pipeline for azure-kusto-spark
# Triggers on push to any branch and PRs
# Equivalent of .github/workflows/build.yml

trigger:
  branches:
    include:
      - '*'

pr:
  branches:
    include:
      - '*'

pool:
  vmImage: 'ubuntu-latest'

variables:
  MAVEN_CACHE_FOLDER: $(HOME)/.m2/repository
  JAVA_VERSION: '21'
  # Pipeline variables (set in ADO UI):
  # APP_ID, TENANT_ID, AZURE_SUBSCRIPTION_ID, CLUSTER, DATABASE
  # STORAGE_CONTAINER_URL (secret), INGEST_STORAGE_URL (secret), INGEST_STORAGE_CONTAINER (secret)

steps:
  - checkout: self
    fetchDepth: 0

  - task: JavaToolInstaller@0
    displayName: 'Setup Java $(JAVA_VERSION)'
    inputs:
      versionSpec: '$(JAVA_VERSION)'
      jdkArchitectureOption: 'x64'
      jdkSourceOption: 'PreInstalled'

  - task: Cache@2
    displayName: 'Cache Maven local repository'
    inputs:
      key: 'maven | "$(Agent.OS)" | pom.xml | connector/pom.xml'
      path: $(MAVEN_CACHE_FOLDER)
      restoreKeys: |
        maven | "$(Agent.OS)"

  - task: AzureCLI@2
    displayName: 'Get Kusto access token'
    inputs:
      azureSubscription: 'kusto-spark-wif'
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        access_token=$(az account get-access-token --resource=$(APP_ID) --scope=$(CLUSTER)/.default --query accessToken -o tsv)
        echo "##vso[task.setvariable variable=ACCESS_TOKEN;issecret=true]$access_token"

  - task: Maven@4
    displayName: 'Maven clean verify (with E2E tests)'
    inputs:
      mavenPomFile: 'pom.xml'
      goals: 'clean verify'
      options: >-
        -B
        -DtagsToExclude=""
        -DkustoAadAppId=$(APP_ID)
        -DkustoAadAuthorityID=$(TENANT_ID)
        -DkustoDatabase=$(DATABASE)
        -DkustoCluster=$(CLUSTER)
        -DaccessToken=$(ACCESS_TOKEN)
        -DingestStorageUrl=$(INGEST_STORAGE_URL)
        -DingestStorageContainer=$(INGEST_STORAGE_CONTAINER)
      javaHomeOption: 'JDKVersion'
      jdkVersionOption: '1.21'
      publishJUnitResults: false
    env:
      kustoAadAuthorityID: $(TENANT_ID)
      kustoDatabase: $(DATABASE)
      kustoCluster: $(CLUSTER)
      kustoAadAppId: $(APP_ID)
      accessToken: $(ACCESS_TOKEN)
      storageAccountUrl: $(STORAGE_CONTAINER_URL)
      ingestStorageUrl: $(INGEST_STORAGE_URL)
      ingestStorageContainer: $(INGEST_STORAGE_CONTAINER)
    timeoutInMinutes: 40

  - task: PublishTestResults@2
    displayName: 'Publish test results'
    condition: always()
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: '**/surefire-reports/*.xml'
      searchFolder: 'connector/target'
      mergeTestResults: true
      testRunTitle: 'Spark Connector Tests'

  - task: PublishCodeCoverageResults@2
    displayName: 'Publish code coverage'
    condition: always()
    inputs:
      summaryFileLocation: 'connector/target/site/jacoco/jacoco.xml'
      pathToSources: 'connector/src/main/scala'
